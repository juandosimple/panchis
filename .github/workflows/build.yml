name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Debug bundle contents (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "=== dmg dir ==="
          ls -la src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/ || true
          echo "=== macos dir ==="
          ls -la src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ || true

      - name: Debug bundle contents (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          echo "=== msi dir ==="
          ls -la src-tauri/target/release/bundle/msi/ || true
          echo "=== nsis dir ==="
          ls -la src-tauri/target/release/bundle/nsis/ || true

      - name: Upload installers
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  manifest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate latest.json from actual release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          # Wait for upload step to settle
          sleep 10

          # List all asset names from the release
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name')
          echo "Assets in release:"
          echo "$ASSETS"

          # Find the actual filenames (Tauri uses different naming per platform)
          DARWIN_FILE=$(echo "$ASSETS" | grep -E '\.app\.tar\.gz$' | head -n1 || true)
          DARWIN_SIG_FILE=$(echo "$ASSETS" | grep -E '\.app\.tar\.gz\.sig$' | head -n1 || true)
          WINDOWS_FILE=$(echo "$ASSETS" | grep -E '\.nsis\.zip$' | head -n1 || true)
          WINDOWS_SIG_FILE=$(echo "$ASSETS" | grep -E '\.nsis\.zip\.sig$' | head -n1 || true)

          echo "Darwin file: $DARWIN_FILE"
          echo "Darwin sig: $DARWIN_SIG_FILE"
          echo "Windows file: $WINDOWS_FILE"
          echo "Windows sig: $WINDOWS_SIG_FILE"

          # Download .sig files to read their contents
          mkdir -p sigs
          [ -n "$DARWIN_SIG_FILE" ] && gh release download "$TAG" --repo "$REPO" --pattern "$DARWIN_SIG_FILE" --dir ./sigs
          [ -n "$WINDOWS_SIG_FILE" ] && gh release download "$TAG" --repo "$REPO" --pattern "$WINDOWS_SIG_FILE" --dir ./sigs

          DARWIN_SIG=""
          WINDOWS_SIG=""
          [ -n "$DARWIN_SIG_FILE" ] && [ -f "./sigs/$DARWIN_SIG_FILE" ] && DARWIN_SIG=$(cat "./sigs/$DARWIN_SIG_FILE")
          [ -n "$WINDOWS_SIG_FILE" ] && [ -f "./sigs/$WINDOWS_SIG_FILE" ] && WINDOWS_SIG=$(cat "./sigs/$WINDOWS_SIG_FILE")

          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PLATFORMS="{}"
          if [ -n "$DARWIN_FILE" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$DARWIN_SIG" --arg url "${BASE_URL}/${DARWIN_FILE}" '. + {"darwin-aarch64": {signature: $sig, url: $url}}')
          fi
          if [ -n "$WINDOWS_FILE" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$WINDOWS_SIG" --arg url "${BASE_URL}/${WINDOWS_FILE}" '. + {"windows-x86_64": {signature: $sig, url: $url}}')
          fi

          jq -n \
            --arg version "$TAG" \
            --arg notes "Release $TAG" \
            --arg pub_date "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: latest.json
